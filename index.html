<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ari 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #1a001a, #000010);
  overflow:hidden;
  font-family: Arial, sans-serif;
}

/* ✨ EFECTO BRILLO SUAVE */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size:60px 60px;
  animation: estrellas 25s linear infinite;
  opacity:0.25;
}

/* 🌟 brillo extra */
body::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, rgba(255,0,150,0.12), transparent 70%);
  pointer-events:none;
}

@keyframes estrellas{
  from{transform:translateY(0);}
  to{transform:translateY(-600px);}
}

/* CONTADOR */
#contador{
  position:absolute;
  top:10px;
  right:10px;
  color:white;
  font-size:14px;
  z-index:10;
}

/* 💌 SOBRE */
.sobre{
  position:relative;
  width:320px;
  height:220px;
  background:linear-gradient(135deg,#ff4da6,#ff0066);
  border-radius:12px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
  box-shadow:0 0 30px rgba(255,0,150,0.6);
  transition:0.2s;
  z-index:2;
}

.sobre:active{
  transform:scale(0.95) rotate(-2deg);
}

/* 💌 CARTA */
.carta{
  position:absolute;
  width:270px;
  height:170px;
  background:white;
  color:#ff1493;
  top:25px;
  left:25px;
  border-radius:10px;
  padding:10px;
  text-align:center;
  transform:scale(0) translateY(20px);
  opacity:0;
  transition:0.6s ease;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.abierto .carta{
  transform:scale(1.1) translateY(0);
  opacity:1;
}

/* 💖 EFECTOS */
.corazon, .estrella{
  position:absolute;
  font-size:20px;
  animation:flotar linear infinite;
}

@keyframes flotar{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-900px); opacity:0;}
}

/* 💥 EXPLOSIÓN FINAL */
.explosion{
  position:absolute;
  font-size:24px;
  animation:boom 1s ease forwards;
}

@keyframes boom{
  0%{transform:scale(0); opacity:1;}
  100%{transform:scale(3) translateY(-200px); opacity:0;}
}
</style>

</head>

<body>

<audio id="musica" loop preload="auto">
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="contador">Clics: 0 / 10</div>

<div class="sobre" onclick="abrirCarta(this)">
  💌 Ábreme Ari
  <div class="carta">
    <h2>💖 Te amo Ari 💖</h2>
    <p>Eres lo más bonito de mi vida ✨</p>
  </div>
</div>

<script>
let clicks = 0;
let audioIniciado = false;

function iniciarMusica(){
  let audio = document.getElementById("musica");

  if(!audioIniciado){
    audio.volume = 0.7;
    audio.play().catch(() => {});
    audioIniciado = true;
  }
}

function abrirCarta(elemento){
  iniciarMusica();

  clicks++;
  document.getElementById("contador").innerText =
    "Clics: " + clicks + " / 10";

  // animación suave
  elemento.style.transform = "scale(1.05) rotate(2deg)";
  setTimeout(()=>{
    elemento.style.transform = "scale(1) rotate(0deg)";
  },120);

  crearEfectos();

  if(clicks >= 10){
    elemento.classList.add("abierto");
    explosionFinal();
  }
}

function crearEfectos(){
  for(let i=0;i<20;i++){
    let corazon=document.createElement("div");
    corazon.className="corazon";
    corazon.innerHTML="💖";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(corazon);

    let estrella=document.createElement("div");
    estrella.className="estrella";
    estrella.innerHTML="✨";
    estrella.style.left=Math.random()*100+"vw";
    estrella.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(estrella);
  }
}

function explosionFinal(){
  for(let i=0;i<40;i++){
    let boom=document.createElement("div");
    boom.className="explosion";
    boom.innerHTML="💖";
    boom.style.left=Math.random()*100+"vw";
    boom.style.top=Math.random()*100+"vh";
    document.body.appendChild(boom);
  }
}
</script>

</body>
</html>
