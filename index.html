<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ari 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #2a002a, #000010);
  overflow:hidden;
  font-family: Arial, sans-serif;
}

/* ⭐ ESTRELLAS DE FONDO */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size:50px 50px;
  animation: estrellas 20s linear infinite;
  opacity:0.2;
}

@keyframes estrellas{
  from{transform:translateY(0);}
  to{transform:translateY(-500px);}
}

/* CONTADOR */
#contador{
  position:absolute;
  top:10px;
  right:10px;
  color:white;
  font-size:14px;
  z-index:10;
}

/* SOBRE */
.sobre{
  position:relative;
  width:300px;
  height:200px;
  background:linear-gradient(135deg,#ff4da6,#ff0066);
  cursor:pointer;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
  box-shadow:0 0 25px rgba(255,0,150,0.6);
  transition:0.2s;
  z-index:2;
}

.sobre:active{
  transform:scale(0.95) rotate(-2deg);
}

/* CARTA */
.carta{
  position:absolute;
  width:260px;
  height:160px;
  background:white;
  color:#ff1493;
  top:20px;
  left:20px;
  border-radius:10px;
  padding:10px;
  text-align:center;
  transform:scale(0);
  opacity:0;
  transition:0.6s ease;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.abierto .carta{
  transform:scale(1.1);
  opacity:1;
}

/* 💖 EFECTOS */
.corazon, .estrella{
  position:absolute;
  font-size:20px;
  animation:flotar linear infinite;
}

@keyframes flotar{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-900px); opacity:0;}
}
</style>

</head>

<body>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="contador">Clics: 0 / 10</div>

<div class="sobre" onclick="abrirCarta(this)">
  💌 Ábreme Ari
  <div class="carta">
    <h2>💖 Te amo Ari 💖</h2>
    <p>Eres lo más bonito de mi vida ✨</p>
  </div>
</div>

<script>
let clicks = 0;
let audioIniciado = false;

function iniciarMusica(){
  let audio = document.getElementById("musica");

  if(!audioIniciado){
    audio.volume = 0.7;
    audio.play().catch(()=>{});
    audioIniciado = true;
  }
}

function abrirCarta(elemento){
  iniciarMusica();

  clicks++;

  document.getElementById("contador").innerText =
    "Clics: " + clicks + " / 10";

  // vibración visual
  elemento.style.transform = "scale(1.05) rotate(2deg)";
  setTimeout(()=>{
    elemento.style.transform = "scale(1) rotate(0deg)";
  },120);

  crearEfectos();

  if(clicks >= 10){
    elemento.classList.add("abierto");
  }
}

function crearEfectos(){
  for(let i=0;i<25;i++){
    let corazon=document.createElement("div");
    corazon.className="corazon";
    corazon.innerHTML="💖";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(corazon);

    let estrella=document.createElement("div");
    estrella.className="estrella";
    estrella.innerHTML="✨";
    estrella.style.left=Math.random()*100+"vw";
    estrella.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(estrella);
  }
}
</script>

</body>
</html>
