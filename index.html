<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ari 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #1a001a, #330033, #000033);
  overflow:hidden;
  font-family: Arial, sans-serif;
}

/* SOBRE */
.sobre{
  position:relative;
  width:300px;
  height:200px;
  background:#ff4da6;
  cursor:pointer;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
  box-shadow:0 0 20px rgba(255,0,150,0.5);
}

/* CARTA */
.carta{
  position:absolute;
  width:260px;
  height:160px;
  background:white;
  color:#ff1493;
  top:20px;
  left:20px;
  border-radius:10px;
  padding:10px;
  text-align:center;
  transform:scale(0);
  transition:0.8s;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.abierto .carta{
  transform:scale(1.1);
}

h2{
  margin-top:40px;
}

/* EFECTOS */
.corazon, .estrella{
  position:absolute;
  font-size:20px;
  animation:flotar linear infinite;
}

@keyframes flotar{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-800px); opacity:0;}
}
</style>

</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="musica" loop preload="auto">
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 💖 BOTÓN MÚSICA -->
<button onclick="document.getElementById('musica').play()"
style="position:absolute; top:10px; left:10px; padding:8px; border:none; border-radius:8px;">
🎵 Música
</button>

<div class="sobre" onclick="abrirCarta(this)">
  Ábreme 💌
  <div class="carta">
    <h2>💖 Te amo Ari 💖</h2>
    <p>Eres lo más bonito de mi vida ✨</p>
  </div>
</div>

<!-- ================= JAVASCRIPT ================= -->
<script>
function abrirCarta(elemento){
  elemento.classList.toggle("abierto");

  let audio = document.getElementById("musica");
  audio.volume = 0.7;
  audio.play().catch(()=>{});

  crearEfectos();
}

function crearEfectos(){
  for(let i=0;i<60;i++){
    let corazon=document.createElement("div");
    corazon.className="corazon";
    corazon.innerHTML="💖";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(corazon);

    let estrella=document.createElement("div");
    estrella.className="estrella";
    estrella.innerHTML="✨";
    estrella.style.left=Math.random()*100+"vw";
    estrella.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(estrella);
  }
}
</script>

</body>
